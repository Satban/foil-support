<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - Foil</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      padding: 20px;
    }
    .container {
      background: white;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      background: #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.3s ease-out;
    }
    .checkmark svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      animation: drawCheck 0.4s ease-out 0.2s forwards;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
    }
    @keyframes scaleIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    @keyframes drawCheck {
      100% { stroke-dashoffset: 0; }
    }
    h1 {
      color: #2e7d32;
      margin-bottom: 12px;
      font-size: 24px;
    }
    p {
      color: #666;
      margin-bottom: 24px;
    }
    .button {
      display: inline-block;
      background: #4caf50;
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .button:hover {
      background: #43a047;
    }
    .redirect-text {
      margin-top: 20px;
      font-size: 14px;
      color: #999;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .phone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin: 0 auto 20px;
      display: block;
    }
    .hidden {
      display: none;
    }
    .app-store-badge {
      margin-top: 16px;
    }
    .app-store-badge img {
      height: 44px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/foil-support/images/foil-logo.png" alt="Foil" class="logo">
    <div class="checkmark">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Email Confirmed!</h1>

    <!-- iPhone content -->
    <div class="hidden" id="iphoneContent">
      <p>Your account has been verified. You can now sign in to Foil.</p>
      <a href="com.getfoil.app://login-callback/" class="button">Open Foil App</a>
      <p class="redirect-text">
        <span class="spinner"></span>
        Redirecting to app...
      </p>
    </div>

    <!-- Android content -->
    <div class="hidden" id="androidContent">
      <p>Your account has been verified.</p>
      <div class="phone-icon">📱</div>
      <p>Open the <strong>Foil app</strong> on your smartphone to sign in.</p>
    </div>

    <!-- Desktop content -->
    <div class="hidden" id="desktopContent">
      <p>Your account has been verified.</p>
      <div class="phone-icon">📱</div>
      <p>Open the <strong>Foil app</strong> on your phone to sign in.</p>
      <div class="app-store-badge">
        <a href="https://apps.apple.com/app/foil-reduce-food-waste/id6740708498" target="_blank">
          <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>
      </div>
    </div>
  </div>

  <script>
    var ua = navigator.userAgent;

    function isIPhone() {
      return /iPhone|iPad|iPod/i.test(ua);
    }

    function isAndroid() {
      return /Android/i.test(ua);
    }

    if (isIPhone()) {
      // iPhone: show app button and auto-redirect
      document.getElementById('iphoneContent').style.display = 'block';

      setTimeout(function() {
        window.location.href = 'com.getfoil.app://login-callback/';
      }, 2000);
    } else if (isAndroid()) {
      // Android: show "iPhone only" message
      document.getElementById('androidContent').style.display = 'block';
    } else {
      // Desktop: show generic message with App Store link
      document.getElementById('desktopContent').style.display = 'block';
    }
  </script>
</body>
</html>
