<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Foil to Alexa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 {
      font-size: 32px;
      color: #333;
    }
    .logo p {
      color: #666;
      margin-top: 8px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .info {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Foil</h1>
      <p>Link your account to Alexa</p>
    </div>

    <div id="error" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Your password">
      </div>

      <button type="submit" id="submitBtn">Link Account</button>
      <div id="loading" class="loading">Linking your account...</div>
    </form>

    <p class="info">
      Sign in with your Foil account to enable voice commands with Alexa.
    </p>
  </div>

  <script>
    const API_URL = 'https://aqdapnwrsvyjrpiwtwip.supabase.co/functions/v1/alexa-auth';

    // Get OAuth params from URL
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUri = urlParams.get('redirect_uri');
    const state = urlParams.get('state');
    const clientId = urlParams.get('client_id');

    // Show error if present in URL
    const errorParam = urlParams.get('error');
    if (errorParam) {
      document.getElementById('error').textContent = errorParam;
      document.getElementById('error').style.display = 'block';
    }

    // Validate required params
    if (!redirectUri || !state || !clientId) {
      document.getElementById('error').textContent = 'Missing required OAuth parameters. Please try linking your account again from the Alexa app.';
      document.getElementById('error').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');

      errorDiv.style.display = 'none';
      submitBtn.disabled = true;
      loading.style.display = 'block';

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email,
            password,
            redirect_uri: redirectUri,
            state,
            client_id: clientId
          })
        });

        const data = await response.json();

        if (data.error) {
          errorDiv.textContent = data.error;
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        if (data.redirect_url) {
          // Redirect back to Alexa with the auth code
          window.location.href = data.redirect_url;
        } else {
          errorDiv.textContent = 'Unexpected response. Please try again.';
          errorDiv.style.display = 'block';
          submitBtn.disabled = false;
          loading.style.display = 'none';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorDiv.textContent = 'Connection error. Please try again.';
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
